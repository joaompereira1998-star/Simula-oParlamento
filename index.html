<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulação do Parlamento — Grelha de Tempos</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 3rem);
    }

    .header p {
      margin: 0;
      color: #4b5563;
      font-size: 1rem;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 24px 0 32px;
    }

    .top-bar button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      background: #111827;
      color: white;
    }

    .top-bar button:hover {
      opacity: 0.92;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }

    .timer-card {
      background: white;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 18px;
      border: 2px solid transparent;
      transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .timer-card.running {
      border-color: #16a34a;
      background: #f0fdf4;
    }

    .timer-card.danger {
      border-color: #dc2626;
      background: #fff5f5;
    }

    .timer-card.finished {
      border-color: #7f1d1d;
      background: #fef2f2;
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .logo-box {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid #e5e7eb;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: white;
    }

    .party-info {
      min-width: 0;
    }

    .party-name {
      font-size: 1.4rem;
      font-weight: bold;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .party-total {
      color: #4b5563;
      font-size: 0.95rem;
    }

    .timer-display {
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: bold;
      text-align: center;
      margin: 10px 0 16px;
      letter-spacing: 1px;
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      border-radius: 999px;
      transition: width 0.2s linear;
    }

    .timer-card.running .progress-bar {
      background: linear-gradient(90deg, #16a34a, #4ade80);
    }

    .timer-card.danger .progress-bar,
    .timer-card.finished .progress-bar {
      background: linear-gradient(90deg, #dc2626, #f87171);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .controls button {
      border: none;
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
    }

    .start-btn {
      background: #16a34a;
      color: white;
    }

    .stop-btn {
      background: #111827;
      color: white;
    }

    .reset-btn {
      background: #e5e7eb;
      color: #111827;
    }

    .minus-btn,
    .plus-btn {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .controls button:hover {
      opacity: 0.92;
    }

    .status {
      margin-top: 12px;
      text-align: center;
      font-size: 0.92rem;
      font-weight: bold;
      color: #374151;
      min-height: 20px;
    }

    .timer-card.finished .status,
    .timer-card.danger .status {
      color: #b91c1c;
    }

    @media (max-width: 600px) {
      .controls {
        grid-template-columns: repeat(2, 1fr);
      }

      .controls button:last-child {
        grid-column: span 2;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Simulação do Parlamento Português</h1>
      <p>Grelha A — relógios individuais por partido / Governo</p>
    </div>

    <div class="top-bar">
      <button onclick="startAll()">Iniciar todos</button>
      <button onclick="stopAll()">Parar todos</button>
      <button onclick="resetAll()">Repor todos</button>
    </div>

    <div class="grid" id="timersGrid"></div>
  </div>

  <script>
    const parties = [
      { key: "gov", label: "GOV", minutes: 26, logo: "gov.png" },
      { key: "psd", label: "PSD", minutes: 26, logo: "psd.png" },
      { key: "ch", label: "CH", minutes: 22, logo: "ch.png" },
      { key: "ps", label: "PS", minutes: 21, logo: "ps.png" },
      { key: "il", label: "IL", minutes: 10, logo: "il.png" },
      { key: "l", label: "L", minutes: 8, logo: "l.png" },
      { key: "pcp", label: "PCP", minutes: 6, logo: "pcp.png" },
      { key: "cdspp", label: "CDS-PP", minutes: 5, logo: "cdspp.png" },
      { key: "be", label: "BE", minutes: 2, logo: "be.png" },
      { key: "pan", label: "PAN", minutes: 2, logo: "pan.png" },
      { key: "jpp", label: "JPP", minutes: 2, logo: "jpp.png" }
    ];

    const state = {};

    function formatTime(totalSeconds) {
      const safe = Math.max(0, totalSeconds);
      const mins = Math.floor(safe / 60);
      const secs = safe % 60;
      return String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
    }

    function createTimerCard(party) {
      const totalSeconds = party.minutes * 60;

      state[party.key] = {
        totalSeconds,
        remainingSeconds: totalSeconds,
        running: false,
        interval: null
      };

      const card = document.createElement("div");
      card.className = "timer-card";
      card.id = `card-${party.key}`;

      card.innerHTML = `
        <div class="card-top">
          <div class="logo-box">
            <img src="${party.logo}" alt="${party.label}" onerror="this.style.display='none'; this.parentNode.innerHTML='<span style=&quot;font-weight:bold;font-size:0.95rem;color:#374151;&quot;>${party.label}</span>';">
          </div>
          <div class="party-info">
            <div class="party-name">${party.label}</div>
            <div class="party-total">Tempo total: ${party.minutes} min</div>
          </div>
        </div>

        <div class="timer-display" id="display-${party.key}">${formatTime(totalSeconds)}</div>

        <div class="progress-track">
          <div class="progress-bar" id="progress-${party.key}"></div>
        </div>

        <div class="controls">
          <button class="start-btn" onclick="startTimer('${party.key}')">Iniciar</button>
          <button class="stop-btn" onclick="stopTimer('${party.key}')">Parar</button>
          <button class="reset-btn" onclick="resetTimer('${party.key}')">Repor</button>
          <button class="minus-btn" onclick="adjustTimer('${party.key}', -30)">-30s</button>
          <button class="plus-btn" onclick="adjustTimer('${party.key}', 30)">+30s</button>
        </div>

        <div class="status" id="status-${party.key}">Pronto</div>
      `;

      return card;
    }

    function renderTimers() {
      const grid = document.getElementById("timersGrid");
      parties.forEach(party => {
        grid.appendChild(createTimerCard(party));
      });
    }

    function updateUI(key) {
      const timer = state[key];
      const display = document.getElementById(`display-${key}`);
      const progress = document.getElementById(`progress-${key}`);
      const status = document.getElementById(`status-${key}`);
      const card = document.getElementById(`card-${key}`);

      display.textContent = formatTime(timer.remainingSeconds);

      const percent = (timer.remainingSeconds / timer.totalSeconds) * 100;
      progress.style.width = `${Math.max(0, percent)}%`;

      card.classList.remove("running", "danger", "finished");

      if (timer.remainingSeconds <= 0) {
        card.classList.add("finished");
        status.textContent = "Tempo esgotado";
      } else if (timer.remainingSeconds <= 60) {
        card.classList.add("danger");
        status.textContent = "Último minuto";
      } else if (timer.running) {
        card.classList.add("running");
        status.textContent = "Em contagem";
      } else {
        status.textContent = "Parado";
      }
    }

    function tick(key) {
      const timer = state[key];
      if (!timer.running) return;

      if (timer.remainingSeconds > 0) {
        timer.remainingSeconds -= 1;
        updateUI(key);
      }

      if (timer.remainingSeconds <= 0) {
        stopTimer(key);
        timer.remainingSeconds = 0;
        updateUI(key);
      }
    }

    function startTimer(key) {
      const timer = state[key];
      if (timer.running || timer.remainingSeconds <= 0) return;

      timer.running = true;
      timer.interval = setInterval(() => tick(key), 1000);
      updateUI(key);
    }

    function stopTimer(key) {
      const timer = state[key];
      timer.running = false;
      clearInterval(timer.interval);
      timer.interval = null;
      updateUI(key);
    }

    function resetTimer(key) {
      stopTimer(key);
      const timer = state[key];
      timer.remainingSeconds = timer.totalSeconds;
      updateUI(key);
    }

    function adjustTimer(key, delta) {
      const timer = state[key];
      timer.remainingSeconds = Math.max(0, timer.remainingSeconds + delta);
      updateUI(key);
    }

    function startAll() {
      parties.forEach(p => startTimer(p.key));
    }

    function stopAll() {
      parties.forEach(p => stopTimer(p.key));
    }

    function resetAll() {
      parties.forEach(p => resetTimer(p.key));
    }

    renderTimers();
    parties.forEach(p => updateUI(p.key));
  </script>
</body>
</html>
